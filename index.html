<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlan Daily — Learn a Feature in 5 min</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #5865f2;
      --accent-light: #7c87f5;
      --accent-glow: rgba(88, 101, 242, 0.18);
      --text: #e8eaf6;
      --text-muted: #8b93b8;
      --tag-bg: #1e2340;
      --green: #43c59e;
      --yellow: #f5c542;
      --red: #f56565;
      --radius: 14px;
      --font: 'Inter', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 64px;
    }

    header {
      width: 100%;
      max-width: 720px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: var(--accent);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .date-badge {
      font-size: 0.8rem;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 999px;
    }

    .progress-wrap {
      width: 100%;
      max-width: 720px;
      margin-bottom: 28px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 5px;
      background: var(--surface2);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      animation: fadeUp 0.35s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      padding: 28px 32px 22px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, var(--accent-glow) 0%, transparent 70%);
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .day-pill {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent-light);
      background: var(--accent-glow);
      border: 1px solid rgba(88,101,242,0.35);
      padding: 3px 10px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .category-pill {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--tag-bg);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 999px;
    }

    .read-time {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-left: auto;
    }

    .card-title {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.25;
    }

    .card-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    .card-body {
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .description {
      font-size: 0.97rem;
      line-height: 1.75;
      color: var(--text);
    }

    .use-case-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .use-case-block .use-case-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--green);
      margin-bottom: 8px;
    }

    .use-case-text {
      font-size: 0.93rem;
      line-height: 1.7;
      color: var(--text);
    }

    .takeaways {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .takeaways li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.93rem;
      line-height: 1.55;
    }

    .takeaway-dot {
      width: 7px;
      height: 7px;
      min-width: 7px;
      border-radius: 50%;
      background: var(--accent-light);
      margin-top: 6px;
    }

    .docs-link-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .docs-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--accent-light);
      text-decoration: none;
      padding: 10px 18px;
      border: 1px solid rgba(88,101,242,0.4);
      border-radius: 9px;
      background: var(--accent-glow);
      transition: background 0.2s, border-color 0.2s;
    }

    .docs-link:hover {
      background: rgba(88,101,242,0.28);
      border-color: rgba(88,101,242,0.7);
    }

    .docs-link svg { width: 14px; height: 14px; }

    .nav {
      width: 100%;
      max-width: 720px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 24px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 9px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-btn:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }

    .nav-counter {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .index-toggle {
      width: 100%;
      max-width: 720px;
      margin-top: 16px;
      text-align: center;
    }

    .index-toggle button {
      font-size: 0.82rem;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .index-toggle button:hover { color: var(--text); }

    .index-grid {
      display: none;
      width: 100%;
      max-width: 720px;
      margin-top: 20px;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 10px;
    }

    .index-grid.open { display: grid; }

    .index-item {
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.84rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.2s;
    }

    .index-item:hover { border-color: var(--accent); }
    .index-item.active { border-color: var(--accent); color: var(--accent-light); }

    .index-num {
      font-size: 0.7rem;
      color: var(--text-muted);
      min-width: 22px;
    }

    @media (max-width: 500px) {
      .card-header, .card-body { padding: 20px 18px; }
      .card-title { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    Atlan Daily
  </div>
  <div class="date-badge" id="dateBadge"></div>
</header>

<div class="progress-wrap">
  <div class="progress-meta">
    <span id="progressLabel">Today's feature</span>
    <span id="progressCount"></span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<div class="card" id="card">
  <div class="card-header">
    <div class="card-meta">
      <span class="day-pill" id="dayPill"></span>
      <span class="category-pill" id="categoryPill"></span>
      <span class="read-time" id="readTime"></span>
    </div>
    <div class="card-title" id="featureTitle"></div>
    <div class="card-subtitle" id="featureSubtitle"></div>
  </div>
  <div class="card-body">
    <div>
      <div class="section-label">What it is</div>
      <div class="description" id="featureDesc"></div>
    </div>
    <div class="use-case-block">
      <div class="use-case-label">Real-world use case</div>
      <div class="use-case-text" id="featureUseCase"></div>
    </div>
    <div>
      <div class="section-label">Key takeaways</div>
      <ul class="takeaways" id="featureTakeaways"></ul>
    </div>
    <div class="docs-link-wrap">
      <a class="docs-link" id="featureDocsLink" href="#" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        Read official docs
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>
    </div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← Previous</button>
  <span class="nav-counter" id="navCounter"></span>
  <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next →</button>
</div>

<div class="index-toggle">
  <button onclick="toggleIndex()">Browse all features ↓</button>
</div>

<div class="index-grid" id="indexGrid"></div>

let currentIndex = 0;
let indexOpen = false;

function getTodayIndex() {
  const start = new Date(new Date().getFullYear(), 0, 0);
  const diff = new Date() - start;
  const oneDay = 1000 * 60 * 60 * 24;
  const dayOfYear = Math.floor(diff / oneDay);
  return dayOfYear % FEATURES.length;
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

function render(index) {
  const f = FEATURES[index];
  document.getElementById('featureTitle').textContent = f.title;
  document.getElementById('featureSubtitle').textContent = f.subtitle;
  document.getElementById('categoryPill').textContent = f.category;
  document.getElementById('readTime').textContent = f.readTime;
  document.getElementById('dayPill').textContent = `Feature ${index + 1} of ${FEATURES.length}`;
  document.getElementById('featureDesc').textContent = f.description;
  document.getElementById('featureUseCase').textContent = f.useCase;
  document.getElementById('featureDocsLink').href = f.docsUrl;

  const ul = document.getElementById('featureTakeaways');
  ul.innerHTML = '';
  f.takeaways.forEach(t => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="takeaway-dot"></span><span>${t}</span>`;
    ul.appendChild(li);
  });

  document.getElementById('prevBtn').disabled = index === 0;
  document.getElementById('nextBtn').disabled = index === FEATURES.length - 1;
  document.getElementById('navCounter').textContent = `${index + 1} / ${FEATURES.length}`;

  const pct = ((index + 1) / FEATURES.length * 100).toFixed(1);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `${index + 1} / ${FEATURES.length} features`;

  document.querySelectorAll('.index-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });

  const card = document.getElementById('card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';
}

function navigate(dir) {
  const next = currentIndex + dir;
  if (next >= 0 && next < FEATURES.length) {
    currentIndex = next;
    render(currentIndex);
  }
}

function goTo(index) {
  currentIndex = index;
  render(currentIndex);
  if (indexOpen) toggleIndex();
}

function toggleIndex() {
  indexOpen = !indexOpen;
  const grid = document.getElementById('indexGrid');
  grid.classList.toggle('open', indexOpen);
  document.querySelector('.index-toggle button').textContent =
    indexOpen ? 'Hide all features ↑' : 'Browse all features ↓';
}

function buildIndex() {
  const grid = document.getElementById('indexGrid');
  FEATURES.forEach((f, i) => {
    const el = document.createElement('div');
    el.className = 'index-item';
    el.innerHTML = `<span class="index-num">${String(i + 1).padStart(2, '0')}</span><span>${f.title}</span>`;
    el.onclick = () => goTo(i);
    grid.appendChild(el);
  });
}

document.getElementById('dateBadge').textContent = formatDate(new Date());
currentIndex = getTodayIndex();
buildIndex();
render(currentIndex);
</script>
